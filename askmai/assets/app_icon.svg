<svg width="512" height="512" viewBox="15 15 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Plate Gradient -->
    <linearGradient id="nordBg" x1="15" y1="15" x2="105" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b4252"/>
      <stop offset="100%" stop-color="#2e3440"/>
    </linearGradient>
    

    
    <!-- Vertical Core Ocean Gradient (Light Top, Dark Bottom) -->
    <linearGradient id="verticalCoreOcean" x1="60" y1="45" x2="60" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#88c0d0"/>
      <stop offset="100%" stop-color="#5e81ac"/>
    </linearGradient>
    
    <!-- Core Rim Light Highlight -->
    <linearGradient id="coreRimHighlight" x1="60" y1="45" x2="60" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Outer Background Plate -->
  <rect x="15" y="15" width="90" height="90" rx="0" fill="url(#nordBg)"/>
  
  <!-- Channels (Pipelines) -->
  <!-- ChatGPT Mint Green -->
  <path d="M 35,35 L 52,52" stroke="#8fbcbb" stroke-width="5.2" stroke-linecap="round"/>
  <!-- Claude Muted Orange -->
  <path d="M 35,85 L 52,68" stroke="#d08770" stroke-width="5.2" stroke-linecap="round"/>
  <!-- DeepSeek / Gemini Ice Blue -->
  <path d="M 85,60 L 71,60" stroke="#81a1c1" stroke-width="5.2" stroke-linecap="round"/>
  
  <!-- Channel Terminal Nodes -->
  <circle cx="35" cy="35" r="7.5" fill="#8fbcbb"/>
  <circle cx="35" cy="85" r="7.5" fill="#d08770"/>
  <circle cx="85" cy="60" r="7.5" fill="#81a1c1"/>
  
  <!-- Central Glass Core -->
  <circle cx="60" cy="60" r="14.5" fill="url(#verticalCoreOcean)"/>
  <!-- Core Bevel Highlight stroke -->
  <circle cx="60" cy="60" r="14.5" stroke="url(#coreRimHighlight)" stroke-width="1.2"/>
</svg>
