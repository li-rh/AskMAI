name: askmai
description: "Multi-LLM Chat Client - Flutter. Send queries to multiple LLMs simultaneously and compare responses."
publish_to: 'none'

version: 1.1.7+8

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # WebView & 自动化
  webview_flutter: ^4.0.0

  # 状态管理
  provider: ^6.0.0

  # 数据持久化
  shared_preferences: ^2.1.0

  # JSON序列化
  json_annotation: ^4.12.0

  # 工具
  http: ^1.1.0
  uuid: ^4.0.0
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0
  file_picker: ^8.1.1
  webview_flutter_android: ^4.12.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/site_config.json
    - assets/app_config.json
    - assets/prompt_template.json

  # 取消注释以下行以使用自定义字体
  # fonts:
