org.gradle.jvmargs=-Xmx4G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=true
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# Workaround: Kotlin 2.2.x daemon incremental cache crash (FilePageCache "already registered")
# The daemon crashes on cache close, Gradle falls back to in-process compile anyway.
# Disabling incremental avoids the crash entirely with negligible build-time impact for plugin code.
kotlin.incremental=false
