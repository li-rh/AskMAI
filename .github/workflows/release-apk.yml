name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: askmai
        run: flutter pub get

      - name: Analyze
        working-directory: askmai
        run: flutter analyze || true

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > askmai/android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "keyAlias=$ANDROID_KEY_ALIAS" > askmai/android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> askmai/android/key.properties
          echo "storePassword=$ANDROID_STORE_PASSWORD" >> askmai/android/key.properties
          echo "storeFile=upload-keystore.jks" >> askmai/android/key.properties

      - name: Build APK
        working-directory: askmai
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp askmai/build/app/outputs/flutter-apk/app-release.apk askmai/build/app/outputs/flutter-apk/AskMAI-${GITHUB_REF_NAME}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: askmai/build/app/outputs/flutter-apk/AskMAI-${{ github.ref_name }}.apk
          generate_release_notes: true
